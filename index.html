<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Timeline & Charts</title>
    
    <!-- Font da Dev -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Chart.js per generare grafici via codice -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #2e3440;       
            --text-color: #d8dee9;     
            --accent-color: #88c0d0;   
            --line-color: #4c566a;     
            --card-bg: #3b4252;        
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            margin-bottom: 60px;
        }

        header h1 {
            color: var(--accent-color);
            margin: 0 0 10px 0;
            font-size: 2rem;
        }

        header p {
            margin: 0;
            color: #a3be8c; 
            font-size: 0.9rem;
        }

        .timeline {
            position: relative;
            border-left: 2px solid var(--line-color);
            padding-left: 30px;
            margin-left: 10px;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 50px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -41px; 
            top: 6px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--accent-color);
            border: 5px solid var(--bg-color);
            transition: transform 0.3s ease;
        }

        .timeline-item:hover::before {
            transform: scale(1.3);
        }

        .date {
            font-size: 0.85rem;
            color: #ebcb8b; 
            font-weight: 700;
            margin-bottom: 8px;
        }

        .content {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .content h2 {
            margin: 0 0 10px 0;
            font-size: 1.25rem;
            color: var(--text-color);
        }

        .content p {
            margin: 0;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #e5e9f0;
        }

        /* Container per il grafico autogenerato */
        .chart-container {
            margin-top: 20px;
            position: relative;
            width: 100%;
            height: 220px; /* Altezza compatta per la timeline */
        }

        .tags {
            margin-top: 20px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.75rem;
            background-color: rgba(136, 192, 208, 0.1);
            color: var(--accent-color);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid rgba(136, 192, 208, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>~/Hi my name is Vit</h1>
            <p>// Pensieri sparsi.</p>
        </header>

        <div class="timeline" id="timeline"></div>
    </div>

    <script>
        // Il tuo JSON potenziato. Se inserisci l'oggetto 'grafico', genera il grafico a barre o linee.
        const esperienze = [
{
                data: "Luglio 2026",
                titolo: "3 Weekend fuori dalla Comfort Zone: L'illusione dell'AI e il bivio Cloud Architect",
                descrizione: `Nell'ultimo anno mi sono diviso tra il ruolo di Scrum Master e lo sviluppo RPA, muovendomi spesso nel mondo dei dati 'a valle' con Denodo e PowerBI. Ebbene tre weekend fa ho deciso di accettare una sfida diversa. Un amico si era incagliato usando Claude su un modello finanziario e ho colto il pretesto per sviluppare <strong>CASHEN</strong>: una serie di container Docker su una VPS economica gestiti tramite crontab per fare analisi tecnica e inviare un report settimanale su un gruppo Telegram.<br><br>
Intendiamoci: nulla di trascendentale o cloud-native. Ma nel 2026, usare una VPS da 3,66€ IVA inclusa ha un senso preciso: ti costringe a gestire RAM e CPU al milligrammo, affrontando logiche di Azure DevOps (pipeline, library, gestione dei secret) e Docker da zero. <br><br>
Guardando la frammentazione del tempo speso, lo sforzo reale ha tradito le aspettative iniziali:<br><br>
• <strong>30% - Data Engineering & XBRL SEC (Python):</strong> Gestione del parsing dei dati finanziari da EDGAR, distinguendo i report 10-Q dai 10-K per evitare il look-ahead bias.<br>
• <strong>25% - CI/CD (Azure Pipelines) & Docker:</strong> Configurazione del deploy e isolamento degli scraper in container indipendenti su rete condivisa.<br>
• <strong>20% - Database (PostgreSQL, Views, SQL):</strong> Uso del DB come motore logico con l'architettura degli schemi grezzi e dello schema <i>silver</i>.<br>
• <strong>15% - API Resiliency & Rate Limiting:</strong> Gestione difensiva dei tier gratuiti tramite code database-driven.<br>
• <strong>10% - Testing, Logging & Observability:</strong> Tracciabilità del flusso e reportistica vettoriale.<br><br>
<u>L'illusione dell'AI: Percezione, Conoscenza, Esperienza</u><br>
Sviluppando questo progetto e usando l'AI in maniera massiva (attraverso tool come <i>antigravity</i> dotati di skill, MCP e hooks), ho vissuto tre passaggi cognitivi accelerati:<br><br>
1. <strong>La Percezione:</strong> L'illusione iniziale. L'AI ti spiega un argomento in modo così semplice che pensi di averlo interiorizzato. Poi vieni interpellato singolarmente e cadi dal pero letteralmente.<br>
2. <strong>La Conoscenza:</strong> Il livello successivo, figlio dell'esposizione. Impari a lanciare un <code>docker ps -a</code> o a debuggare al volo gli errori più frequenti.<br>
3. <strong>L'Esperienza:</strong> La sensibilità umana di chi si è fatto male. Quella che ti fa prevenire le dinamiche in sicurezza per evitarti commit fatti a caso (al quarto commit fallito di fila sulla pipeline YAML, ho scritto nei log: <i>'too many commits make Vit sad'</i>).<br><br>
Questo è il vero punto di partenza per capire come cambierà il nostro lavoro. Spesso quando si parla di AI si invoca il metodo HITL (Human-in-the-Loop), pretendendo dall'uomo un livello di etica e controllo impareggiabile. Ma come può l'uomo fare da loop se è inesperto e si ritrova a essere un collo di bottiglia per bande di informazioni esageratamente dense?<br><br>
Se accetti i tuoi limiti di banda sei lento; se vuoi essere sicuro hai bisogno di un'esperienza che oggi ancora non hai. Se manca un metodo discusso intimamente con se stessi, vince a mani basse la logica del <strong>'doganiere di second'ordine'</strong>: quello che fa passare tutto con un sorriso, nella speranza che non ci sia codice malevolo o fallato. Questo approccio uccide le aziende ed è difficilissimo da scovare. Servono nuovi sistemi per aiutare l'uomo in questo viaggio quantico che l'AI ci pone davanti.<br><br>
<u>Il Bivio Futuro: Quali prossimi passi?</u><br>
Al netto delle considerazioni filosofiche, le scelte di oggi pesano esponenzialmente sul nostro lavoro di domani. Questo viaggio nelle tubature del codice mi ha messo davanti a due strade chiare per la mia specializzazione attraverso l'ecosistema Google Cloud:<br><br>
• <u>Data Cloud Architect:</u> Per unire il mio background sui dati (Denodo, PowerBI) alle logiche di ingestion, pulizia e strutturazione del dato su larga scala nel cloud, cavalcando quel 50% di tempo speso tra Data Engineering e Database.<br><br>
• <u>Cloud Architect:</u> Per focalizzarmi interamente sulla progettazione di infrastrutture robuste, sicure e disaccoppiate, stimolato da quel 50% di tempo speso a lottare con Docker, reti, CI/CD e limiti hardware.<br><br>
Tre weekend non cambiano una carriera, ma mi hanno ricordato che per governare l'AI di domani, dobbiamo smettere di fare i doganieri e ricominciare a fare esperienza.`,
                tags: ["DataEngineering", "VPS", "Docker", "DevOps", "ContinuousLearning", "AI"],
                grafico: {
                    tipo: "pie", 
                    etichette: ["Data Eng. & SEC", "CI/CD & Docker", "PostgreSQL & Views", "API Resiliency", "Testing & Logging"],
                    dati: [30, 25, 20, 15, 10],
                    labelLegenda: "Ripartizione tempo (%)"
                }
            }
        ];

        function renderTimeline() {
            const container = document.getElementById('timeline');
            
            container.innerHTML = esperienze.map((item, index) => {
                // Se c'è un grafico nell'oggetto JSON, crea un tag <canvas> con ID univoco
                const canvasHtml = item.grafico 
                    ? `<div class="chart-container"><canvas id="chart-${index}"></canvas></div>` 
                    : '';

                return `
                    <div class="timeline-item">
                        <div class="date">${item.data}</div>
                        <div class="content">
                            <h2>${item.titolo}</h2>
                            <p>${item.descrizione}</p>
                            ${canvasHtml}
                            <div class="tags">
                                ${item.tags.map(tag => `<span class="tag">#${tag}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Dopo aver creato i canvas nel DOM, inizializza Chart.js per ognuno
            esperienze.forEach((item, index) => {
                if (!item.grafico) return;

                const ctx = document.getElementById(`chart-${index}`).getContext('2d');
                
                // Configurazione globale minimale stile Dev/Nord
                new Chart(ctx, {
                    type: item.grafico.tipo,
                    data: {
                        labels: item.grafico.etichette,
                        datasets: [{
                            label: item.grafico.labelLegenda,
                            data: item.grafico.dati,
                            backgroundColor: item.grafico.tipo === 'bar' ? 'rgba(136, 192, 208, 0.4)' : 'rgba(136, 192, 208, 0.1)',
                            borderColor: '#88c0d0', // Azzurro pastello del tema
                            borderWidth: 2,
                            tension: 0.3, // Curve morbide per i grafici a linee
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: {
                                    color: '#d8dee9', // Colore testo legenda
                                    font: { family: 'JetBrains Mono', size: 11 }
                                }
                            }
                        },
                        scales: {
                            x: {
                                grid: { color: '#4c566a' }, // Colore griglia
                                ticks: { color: '#d8dee9', font: { family: 'JetBrains Mono', size: 10 } }
                            },
                            y: {
                                grid: { color: '#4c566a' },
                                ticks: { color: '#d8dee9', font: { family: 'JetBrains Mono', size: 10 } }
                            }
                        }
                    }
                });
            });
        }

        document.addEventListener('DOMContentLoaded', renderTimeline);
    </script>
</body>
</html>
