<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciao Vit!</title>

    <!-- Font da Dev -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Chart.js per generare grafici via codice -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Parser YAML e Markdown per caricare post dinamici -->
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Cloudflare Web Analytics -->
    <script type='module' src='https://static.cloudflareinsights.com/beacon.min.js'
        data-cf-beacon='{"token": "09d87c1115d94a4c995bcfd123195e2e"}'></script><!-- End Cloudflare Web Analytics -->
    <style>
        :root {
            --bg-color: #2e3440;
            --text-color: #d8dee9;
            --accent-color: #88c0d0;
            --line-color: #4c566a;
            --card-bg: #3b4252;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            margin-bottom: 60px;
        }

        header h1 {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--accent-color);
            margin: 0 0 10px 0;
            font-size: 2rem;
        }

        .github-link {
            color: var(--accent-color);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .github-link svg {
            transition: transform 0.2s ease;
        }

        .github-link:hover {
            color: #d8dee9;
        }

        .github-link:hover svg {
            transform: scale(1.15);
        }

        header p {
            margin: 0;
            color: #a3be8c;
            font-size: 0.9rem;
        }

        .timeline {
            position: relative;
            border-left: 2px solid var(--line-color);
            padding-left: 30px;
            margin-left: 10px;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .timeline-item.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -41px;
            top: 6px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--accent-color);
            border: 5px solid var(--bg-color);
            transition: transform 0.3s ease;
        }

        .timeline-item:hover::before {
            transform: scale(1.3);
        }

        .date {
            font-size: 0.85rem;
            color: #ebcb8b;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .content {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .content h2 {
            margin: 0 0 10px 0;
            font-size: 1.25rem;
            color: var(--text-color);
        }

        .content p {
            margin: 0 0 16px 0;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #e5e9f0;
        }

        .content p:last-child {
            margin-bottom: 0;
        }

        .content h3 {
            color: var(--accent-color);
            margin: 24px 0 12px 0;
            font-size: 1.1rem;
        }

        .content ul,
        .content ol {
            margin: 0 0 16px 0;
            padding-left: 20px;
        }

        .content li {
            margin-bottom: 8px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #e5e9f0;
        }

        .content code {
            background-color: rgba(0, 0, 0, 0.25);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Container per il grafico autogenerato */
        .chart-container {
            margin-top: 20px;
            position: relative;
            width: 100%;
            height: 220px;
            /* Altezza compatta per la timeline */
        }

        .tags {
            margin-top: 20px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.75rem;
            background-color: rgba(136, 192, 208, 0.1);
            color: var(--accent-color);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid rgba(136, 192, 208, 0.2);
        }

        /* Contenitore testo espandibile */
        .content-body {
            position: relative;
            max-height: none;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .content-body.collapsed {
            max-height: 200px;
            cursor: pointer;
        }

        /* Gradiente di dissolvenza in modalità collassata */
        .content-body.collapsed::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(to bottom, rgba(59, 66, 82, 0), var(--card-bg));
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        /* Bottone per espandere/comprimere */
        .expand-btn {
            display: none;
            background: none;
            border: none;
            color: var(--accent-color);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            margin: 12px 0 20px 0;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid rgba(136, 192, 208, 0.2);
            background-color: rgba(136, 192, 208, 0.05);
            transition: all 0.2s ease;
        }

        .expand-btn:hover {
            background-color: rgba(136, 192, 208, 0.15);
            border-color: var(--accent-color);
        }

        /* Responsività Mobile */
        @media (max-width: 600px) {
            body {
                padding: 20px 15px;
            }

            header {
                margin-bottom: 30px;
            }

            header h1 {
                font-size: 1.5rem;
            }

            header p {
                font-size: 0.8rem;
            }

            .timeline {
                border-left: none;
                padding-left: 0;
                margin-left: 0;
            }

            .timeline-item {
                margin-bottom: 30px;
            }

            .timeline-item::before {
                display: none;
            }

            .content {
                padding: 16px;
            }

            .content h2 {
                font-size: 1.1rem;
            }

            .content p,
            .content li {
                font-size: 0.85rem;
            }

            .chart-container {
                height: 180px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>
                <a href="https://github.com/VRiccardo" target="_blank" rel="noopener noreferrer" class="github-link"
                    aria-label="GitHub Profile">
                    <svg height="1.1em" viewBox="0 0 16 16" width="1.1em" fill="currentColor">
                        <path
                            d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.35 3.12.88.01.47.01.84.01.97 0 .21-.15.46-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8z">
                        </path>
                    </svg>
                    ~/Hi my name is Vit
                </a>
            </h1>
            <p>// Pensieri sparsi.</p>
        </header>

        <div class="timeline" id="timeline"></div>
    </div>

    <script>
        async function loadPosts() {
            const container = document.getElementById('timeline');
            try {
                // Fetch the list of post files
                const response = await fetch('posts.json');
                if (!response.ok) {
                    throw new Error(`Impossibile caricare posts.json (${response.status} ${response.statusText})`);
                }
                const postFiles = await response.json();

                const esperienze = [];

                for (const file of postFiles) {
                    try {
                        const postRes = await fetch(file);
                        if (!postRes.ok) {
                            console.error(`Impossibile recuperare il post: ${file}`);
                            continue;
                        }
                        const rawText = await postRes.text();

                        // Parse front-matter and markdown content
                        let attributes = {};
                        let body = rawText;

                        if (rawText.startsWith('---')) {
                            const secondDashIdx = rawText.indexOf('---', 3);
                            if (secondDashIdx !== -1) {
                                const frontMatterStr = rawText.substring(3, secondDashIdx);
                                attributes = jsyaml.load(frontMatterStr) || {};
                                body = rawText.substring(secondDashIdx + 3);
                            }
                        }
                        const htmlContent = marked.parse(body);

                        esperienze.push({
                            data: attributes.data || attributes.date || "Senza data",
                            titolo: attributes.titolo || attributes.title || "Senza titolo",
                            descrizione: htmlContent,
                            tags: attributes.tags || [],
                            grafico: attributes.grafico || null
                        });
                    } catch (err) {
                        console.error(`Errore nel processare il file ${file}:`, err);
                    }
                }

                renderTimeline(esperienze);
            } catch (err) {
                console.error("Errore nel caricamento dei post:", err);
                container.innerHTML = `
                    <div class="timeline-item">
                        <div class="content" style="border: 1px solid #bf616a;">
                            <h2 style="color: #bf616a;">Errore di caricamento</h2>
                            <p>Non è stato possibile caricare la timeline dei post. Dettaglio: ${err.message}</p>
                        </div>
                    </div>
                `;
            }
        }

        function renderTimeline(esperienze) {
            const container = document.getElementById('timeline');
            if (esperienze.length === 0) {
                container.innerHTML = `
                    <div class="timeline-item">
                        <div class="content">
                            <h2>Nessun post trovato</h2>
                            <p>Aggiungi dei file .md nella cartella dei post e aggiorna posts.json.</p>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = esperienze.map((item, index) => {
                const canvasHtml = item.grafico
                    ? `<div class="chart-container"><canvas id="chart-${index}"></canvas></div>`
                    : '';

                return `
                    <div class="timeline-item">
                        <div class="date">${item.data}</div>
                        <div class="content">
                            <h2>${item.titolo}</h2>
                            <div class="content-body">${item.descrizione}</div>
                            <button class="expand-btn">// Leggi tutto</button>
                            ${canvasHtml}
                            <div class="tags">
                                ${item.tags.map(tag => `<span class="tag">#${tag}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            const isMobile = window.innerWidth <= 600;
            const chartFontSize = isMobile ? 8 : 10;
            const legendFontSize = isMobile ? 9 : 11;

            esperienze.forEach((item, index) => {
                if (!item.grafico) return;

                const canvasEl = document.getElementById(`chart-${index}`);
                if (!canvasEl) return;
                const ctx = canvasEl.getContext('2d');

                new Chart(ctx, {
                    type: item.grafico.tipo,
                    data: {
                        labels: item.grafico.etichette,
                        datasets: [{
                            label: item.grafico.labelLegenda,
                            data: item.grafico.dati,
                            backgroundColor: item.grafico.tipo === 'bar' ? 'rgba(136, 192, 208, 0.4)' : 'rgba(136, 192, 208, 0.1)',
                            borderColor: '#88c0d0',
                            borderWidth: 2,
                            tension: 0.3,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: {
                                    color: '#d8dee9',
                                    font: { family: 'JetBrains Mono', size: legendFontSize }
                                }
                            }
                        },
                        scales: {
                            x: {
                                grid: { color: '#4c566a' },
                                ticks: { color: '#d8dee9', font: { family: 'JetBrains Mono', size: chartFontSize } }
                            },
                            y: {
                                grid: { color: '#4c566a' },
                                ticks: { color: '#d8dee9', font: { family: 'JetBrains Mono', size: chartFontSize } }
                            }
                        }
                    }
                });
            });

            const timelineItems = container.querySelectorAll('.timeline-item');
            timelineItems.forEach(item => {
                const bodyEl = item.querySelector('.content-body');
                const btnEl = item.querySelector('.expand-btn');
                if (!bodyEl || !btnEl) return;

                if (bodyEl.scrollHeight > 200) {
                    bodyEl.classList.add('collapsed');
                    bodyEl.style.maxHeight = '200px';
                    btnEl.style.display = 'inline-block';

                    const toggleExpand = (e) => {
                        e.stopPropagation();
                        const isCollapsed = bodyEl.classList.contains('collapsed');
                        if (isCollapsed) {
                            // Espandi a scrollHeight completo
                            bodyEl.style.maxHeight = bodyEl.scrollHeight + 'px';
                            bodyEl.classList.remove('collapsed');
                            btnEl.textContent = '// Riduci';

                            const onTransitionEnd = () => {
                                if (!bodyEl.classList.contains('collapsed')) {
                                    bodyEl.style.maxHeight = 'none';
                                }
                                bodyEl.removeEventListener('transitionend', onTransitionEnd);
                            };
                            bodyEl.addEventListener('transitionend', onTransitionEnd);
                        } else {
                            bodyEl.style.maxHeight = bodyEl.scrollHeight + 'px';
                            bodyEl.offsetHeight;
                            bodyEl.style.maxHeight = '200px';
                            bodyEl.classList.add('collapsed');
                            btnEl.textContent = '// Leggi tutto';

                            item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        }
                    };

                    btnEl.addEventListener('click', toggleExpand);
                    bodyEl.addEventListener('click', () => {
                        if (bodyEl.classList.contains('collapsed')) {
                            toggleExpand(new Event('click'));
                        }
                    });
                }
            });
            const items = container.querySelectorAll('.timeline-item');
            items.forEach((item, index) => {
                setTimeout(() => {
                    item.classList.add('loaded');
                }, index * 100);
            });
        }
        document.addEventListener('DOMContentLoaded', loadPosts);
    </script>
</body>

</html>
